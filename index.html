<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat con IA</title>
  <!-- Enlazamos una hoja de estilos simple para darle un aspecto agradable -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Chat con IA</h1>
  <p>Introduce una pregunta o consulta y el asistente de IA responderá.</p>
  <textarea id="user-input" rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>
  <button id="send-button">Enviar</button>
  <pre id="response" class="response"></pre>

  <!-- Script principal que maneja la llamada a la API -->
  <script src="script.js"></script>
</body>
</html>
